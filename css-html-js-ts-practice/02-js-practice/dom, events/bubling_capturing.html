<!DOCTYPE html>

<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width">
        <meta charset="UTF-8">
        <title>Всплытие и погружение ивентов</title>
    </head>

    <body>
        <div class="div" style="position:relative; width: 50%; height: 100px; border: 2px solid black;">
            DIV
            <div class="inner-div" style="position:absolute; width: 50%; border: 2px solid black; bottom: 0px; right: 0px;">
                Inner div
                <p> P </p>
            </div>
        </div>

        <script>
            const allElements = document.querySelectorAll('*');

            allElements.forEach(elem => {
                elem.addEventListener('click', e => alert(`Всплытие ${e.currentTarget.textContent}`))
                elem.addEventListener('click', e => alert(`Погружение ${e.currentTarget.textContent} \nТриггер - ${e.target}`), true)
            }
        )
        </script>
    </body>
</html>
